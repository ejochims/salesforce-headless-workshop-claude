<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Build a custom React app on live Salesforce data in under an hour, with Claude Code on the keyboard." />
    <meta property="og:title" content="Salesforce Headless Workshop" />
    <meta property="og:description" content="Build a custom React app on live Salesforce data in under an hour, with Claude Code on the keyboard." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Salesforce Headless Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        background: #F7F9FC;
        color: #182230;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      code, pre, .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #B9C7D9; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
